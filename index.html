<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Equipment Hours • Realtime Cloud</title>
<style>
  :root {
    --bg: #0d1421; --card: rgba(20,30,50,0.9); --border: #2a3a5a;
    --text: #e0e8ff; --accent: #5a9fff; --green: #44cc88; --red: #ff5555;
  }
  body { margin:0; font-family:system-ui,sans-serif; background:var(--bg); color:var(--text); padding:16px; }
  .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:24px; margin:20px auto; box-shadow:0 10px 30px rgba(0,0,0,0.6); max-width:100%; }
  input, button { width:100%; padding:12px; margin:8px 0; border-radius:8px; border:none; }
  input { background:rgba(255,255,255,0.08); color:white; }
  button { font-weight:600; cursor:pointer; }
  .btn-primary { background:var(--accent); color:white; }
  .btn-google { background:white; color:#333; display:flex; align-items:center; justify-content:center; gap:10px; }
  .link { color:#aaccff; background:none; border:none; cursor:pointer; text-decoration:underline; font-size:0.95rem; }
  .error { color:#ffaa88; margin:10px 0; min-height:20px; }
  table { width:100%; border-collapse:collapse; margin-top:20px; }
  th, td { padding:10px; border:1px solid rgba(255,255,255,0.1); text-align:center; }
  .sticky-left { position:sticky; left:0; background:#1a2538; z-index:3; font-weight:bold; min-width:140px; }
  .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:#44cc88; color:white; padding:12px 24px; border-radius:8px; display:none; z-index:1000; }
</style>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="card">
    <h1>Equipment Hours Log</h1>
    <p>Sign in to access realtime data</p>
    <button class="btn-google" id="googleBtn">
      <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="24" height="24">
      Continue with Google
    </button>
    <div style="text-align:center; margin:20px 0; color:#888;">— OR —</div>
    <input type="email" id="email" placeholder="Email" />
    <input type="password" id="password" placeholder="Password" />
    <button class="btn-primary" id="loginBtn">Login</button>
    <button class="link" id="showRegister">Create new account</button>
    <button class="link" id="forgotPass">Forgot Password?</button>
    <div id="loginError" class="error"></div>
  </div>
</div>

<!-- REGISTER SCREEN -->
<div id="registerScreen" style="display:none;">
  <div class="card">
    <h2>Create Account</h2>
    <input type="email" id="regEmail" placeholder="Email" />
    <input type="password" id="regPass" placeholder="Password (min 6 chars)" />
    <button class="btn-primary" id="registerBtn">Register</button>
    <button class="link" id="backToLogin">Back to Login</button>
    <div id="regError" class="error"></div>
  </div>
</div>

<!-- APP -->
<div id="appRoot" style="display:none;">
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
      <h1>Equipment Hours <small id="userInfo" style="color:#88ffaa;"></small></h1>
      <button id="logoutBtn" style="background:var(--red); padding:8px 16px;">Logout</button>
    </div>
    <div style="margin:15px 0; display:flex; gap:8px; flex-wrap:wrap;">
      <input type="date" id="workDate" value="2026-05-24" />
      <button class="btn-primary" id="btnLoadDay">Load Day</button>
      <button class="btn-primary" id="btnSaveDay">Save Day</button>
      <button class="btn-primary" id="btnAddEquipment">+ Add Equipment</button>
    </div>
    <div style="overflow-x:auto;">
      <table id="dailyTable">
        <thead>
          <tr>
            <th class="sticky-left">Equipment</th>
            <th>Date</th>
            <th>Hr Service</th>
            <th>Service Date</th>
            <th>Initial</th>
            <th>Final</th>
            <th>Worked</th>
          </tr>
        </thead>
        <tbody id="dailyBody"></tbody>
      </table>
    </div>
    <button class="btn-primary" id="btnExportCSV" style="margin-top:15px;">Export CSV</button>
  </div>
</div>

<div id="toast" class="toast">Saved Realtime</div>

<script>
// ==================== FIREBASE CONFIG ====================
const firebaseConfig = {
  apiKey: "AIzaSyBgQbh6pp78iwXpH9qdQk1viEgy9zAmX6A",
  authDomain: "equipment-hours-lmp.firebaseapp.com",
  databaseURL: "https://equipment-hours-lmp-default-rtdb.firebaseio.com",
  projectId: "equipment-hours-lmp",
  storageBucket: "equipment-hours-lmp.firebasestorage.app",
  messagingSenderId: "414868275365",
  appId: "1:414868275365:web:467a98dc301e3585e98d4c",
  measurementId: "G-EDRB8HRECD"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUserUID = null;
let equipmentList = ["gen1", "gen2", "gen3", "gen4", "gen5", "comp1", "tower1"];

// ==================== Auth State ====================
auth.onAuthStateChanged(user => {
  if (user) {
    if (!user.emailVerified) {
      alert("Please verify your email before logging in.");
      auth.signOut();
      return;
    }
    currentUserUID = user.uid;
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('registerScreen').style.display = 'none';
    document.getElementById('appRoot').style.display = 'block';
    document.getElementById('userInfo').textContent = `(${user.email})`;
    renderDailyEntry();
  } else {
    currentUserUID = null;
    document.getElementById('appRoot').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'block';
  }
});

// ==================== Login / Register ====================
document.getElementById('loginBtn').onclick = () => {
  const email = document.getElementById('email').value.trim();
  const pass = document.getElementById('password').value;
  auth.signInWithEmailAndPassword(email, pass).catch(err => {
    document.getElementById('loginError').textContent = err.message;
  });
};

document.getElementById('googleBtn').onclick = () => {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => alert(err.message));
};

document.getElementById('showRegister').onclick = () => {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('registerScreen').style.display = 'block';
};

document.getElementById('backToLogin').onclick = () => {
  document.getElementById('registerScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'block';
};

document.getElementById('registerBtn').onclick = () => {
  const email = document.getElementById('regEmail').value.trim();
  const pass = document.getElementById('regPass').value;
  if (pass.length < 6) {
    document.getElementById('regError').textContent = "Password must be at least 6 characters.";
    return;
  }
  auth.createUserWithEmailAndPassword(email, pass)
    .then(userCredential => userCredential.user.sendEmailVerification())
    .then(() => {
      alert("Account created successfully! Please check your email to verify.");
      document.getElementById('registerScreen').style.display = 'none';
      document.getElementById('loginScreen').style.display = 'block';
    })
    .catch(err => document.getElementById('regError').textContent = err.message);
};

document.getElementById('forgotPass').onclick = () => {
  const email = document.getElementById('email').value.trim();
  if (email) {
    auth.sendPasswordResetEmail(email).then(() => alert("Password reset link sent to your email!"));
  }
};

document.getElementById('logoutBtn').onclick = () => auth.signOut();

// ==================== Realtime Database ====================
const getUserRef = (date) => {
  const monthKey = date.substring(0, 7);
  return db.ref(`equipmentHours/${currentUserUID}/${monthKey}/${date}`);
};

function saveDayData() {
  if (!currentUserUID) return;
  const date = document.getElementById('workDate').value;
  const data = {};
  document.querySelectorAll('#dailyBody tr').forEach(row => {
    const eq = row.cells[0].textContent.trim();
    data[eq] = {
      worked: parseFloat(row.querySelector('.worked').textContent) || 0,
      initial: parseFloat(row.querySelector('.initial').value) || 0,
      final: parseFloat(row.querySelector('.final').value) || 0,
      serviceHr: parseFloat(row.querySelector('.service-hr').value) || 0,
      serviceDate: row.querySelector('.service-date').value || ''
    };
  });
  getUserRef(date).set(data);
  showToast("Saved to Cloud • Realtime");
}

function setupRealtimeListener() {
  const date = document.getElementById('workDate').value;
  if (!currentUserUID) return;
  getUserRef(date).on('value', (snapshot) => {
    const data = snapshot.val() || {};
    document.querySelectorAll('#dailyBody tr').forEach(row => {
      const eq = row.cells[0].textContent.trim();
      if (data[eq]) {
        const d = data[eq];
        row.querySelector('.service-hr').value = d.serviceHr || '';
        row.querySelector('.service-date').value = d.serviceDate || '';
        row.querySelector('.initial').value = d.initial || 0;
        row.querySelector('.final').value = d.final || 0;
        row.querySelector('.worked').textContent = (d.worked || 0).toFixed(1);
      }
    });
  });
}

function renderDailyEntry() {
  const date = document.getElementById('workDate').value;
  const tbody = document.getElementById('dailyBody');
  tbody.innerHTML = '';
  equipmentList.forEach(eq => {
    const row = document.createElement('tr');
    row.innerHTML = `
      <td class="sticky-left">${eq}</td>
      <td>${date}</td>
      <td><input type="number" step="0.1" class="service-hr" placeholder="0.0"></td>
      <td><input type="date" class="service-date"></td>
      <td><input type="number" step="0.1" class="initial" value="0"></td>
      <td><input type="number" step="0.1" class="final" value="0"></td>
      <td class="worked">0.0</td>
    `;
    tbody.appendChild(row);
    const init = row.querySelector('.initial');
    const fin = row.querySelector('.final');
    const worked = row.querySelector('.worked');
    const updateWorked = () => {
      const diff = (parseFloat(fin.value) || 0) - (parseFloat(init.value) || 0);
      worked.textContent = diff.toFixed(1);
    };
    init.addEventListener('input', updateWorked);
    fin.addEventListener('input', updateWorked);
  });
  setupRealtimeListener();
}

// Button Events
document.getElementById('btnSaveDay').onclick = saveDayData;
document.getElementById('btnLoadDay').onclick = renderDailyEntry;
document.getElementById('btnAddEquipment').onclick = () => {
  const name = prompt("Enter new equipment name:");
  if (name && !equipmentList.includes(name)) {
    equipmentList.push(name);
    renderDailyEntry();
  }
};
document.getElementById('workDate').addEventListener('change', renderDailyEntry);

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2200);
}

// Export
document.getElementById('btnExportCSV').onclick = () => {
  alert("CSV Export will be added in next update.");
};
</script>
</body>
</html>
